<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Choose your path — Forged Frameworks · Daniel 'Wig' Boyland</title>
<meta name="description" content="The portfolio of Daniel 'Wig' Boyland — Learning Design and ISO / QMS / Accreditation. Two worlds, one forge." />
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ff-paper:        #fcfbf9;
  --ff-paper-edge:   #e0e0e0;
  --ff-copper:       #bc6c3c;
  --ff-copper-hot:   #a05b32;
  --ff-copper-wash:  rgba(188,108,60,0.10);
  --ff-ink:          #2c3e50;
  --ff-ink-muted:    #7f8c8d;
  --ff-ink-faint:    #bdc3c7;
  --font-sans:       'Atkinson Hyperlegible', 'Segoe UI', Tahoma, Verdana, sans-serif;
  --font-mono:       'JetBrains Mono', ui-monospace, 'Courier New', monospace;
}

html {
  height: 100%;
  background: var(--ff-paper);
  font-family: var(--font-sans);
  color: var(--ff-ink);
}

body {
  height: 100%;
  overflow: hidden;
}

@media (max-width: 680px) {
  body { overflow: auto; }
}

/* ---- Skip link ---- */
.skip-link {
  position: absolute; left: -9999px; top: auto; z-index: 10000;
  background: var(--ff-copper); color: #fff;
  padding: 8px 16px; border-radius: 4px; font-family: var(--font-sans);
}
.skip-link:focus { left: 16px; top: 16px; }

/* ---- Matrix canvas ---- */
#matrix {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0; opacity: 0.10; pointer-events: none;
}

/* ---- Gateway shell ---- */
.gateway {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; justify-content: center;
  height: 100dvh;
  padding: clamp(14px, 2.5vh, 28px) clamp(16px, 3.5vw, 48px) clamp(10px, 1.5vh, 20px);
  gap: clamp(10px, 1.8vh, 20px);
}
@media (max-width: 680px) {
  .gateway { height: auto; min-height: 100dvh; }
}

/* ---- Header ---- */
.gw-header {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: clamp(6px, 1vh, 12px); flex-shrink: 0;
}
.gw-brand { display: flex; align-items: center; gap: clamp(10px, 1.4vw, 16px); }
.gw-brand__mark { height: clamp(42px, 5.5vh, 60px); width: auto; flex-shrink: 0; display: block; }
.gw-brand__text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.12; }
.gw-brand__name {
  font-family: var(--font-sans); font-weight: 700; white-space: nowrap;
  font-size: clamp(1rem, 2vw, 1.4rem); color: var(--ff-ink);
}
.gw-brand__sub {
  font-family: var(--font-mono); font-size: clamp(0.62rem, 1.1vw, 0.78rem);
  color: var(--ff-ink-muted); letter-spacing: 0.04em; margin-top: 3px; white-space: nowrap;
}
.gw-welcome {
  font-size: clamp(0.9rem, 1.5vw, 1.05rem); color: var(--ff-ink);
  max-width: 52ch; line-height: 1.6;
}
.gw-welcome strong { color: var(--ff-copper-hot); font-weight: 700; }

/* ---- Divider mark ---- */
.gw-divider {
  display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  opacity: 0.22;
}
.gw-divider__rule { flex: 1; height: 1px; background: var(--ff-copper); }
.gw-divider__mark svg { width: 20px; height: auto; }

/* ---- Portals grid ---- */
.gw-portals {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: clamp(12px, 1.8vw, 24px);
  flex: 0 0 auto; align-self: center;
  width: 100%; max-width: 820px; margin: 0 auto;
}
@media (max-width: 680px) {
  .gw-portals {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
  }
}

/* ---- Portal card ---- */
.portal {
  position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  overflow: hidden;
  width: 100%; min-height: clamp(204px, 28vh, 252px);
  border: 1px solid var(--ff-paper-edge);
  border-top: 4px solid var(--ff-copper);
  border-radius: 8px;
  padding: clamp(14px, 2vw, 22px);
  cursor: pointer;
  font-family: var(--font-sans); color: var(--ff-ink);
  transition: transform 0.32s cubic-bezier(0.22,0.61,0.36,1),
              box-shadow 0.32s cubic-bezier(0.22,0.61,0.36,1),
              background 0.28s ease, border-color 0.28s ease;
  -webkit-tap-highlight-color: transparent;
  appearance: none; -webkit-appearance: none;
}

/* Rest shadows — slightly lifted off the page already */
.portal--ld  { background: #ffffff; box-shadow: 0 4px 20px rgba(0,0,0,0.07), 0 1px 5px rgba(0,0,0,0.04); }
.portal--iso { background: #f3f5f7; border-color: #d4dae0; box-shadow: 0 4px 20px rgba(0,0,0,0.07), 0 1px 5px rgba(0,0,0,0.04); }

/* Hover — lifts high, copper glow (LD) or navy glow (ISO) */
.portal--ld:hover {
  background: #fffcf9;
  transform: translateY(-10px) scale(1.008);
  box-shadow: 0 28px 65px rgba(0,0,0,0.16), 0 8px 22px rgba(0,0,0,0.09),
              0 0 0 1px rgba(188,108,60,0.25), 0 0 28px rgba(188,108,60,0.10);
  border-color: rgba(188,108,60,0.38);
}
.portal--iso:hover {
  background: #ecf0f4;
  transform: translateY(-10px) scale(1.008);
  box-shadow: 0 28px 65px rgba(0,0,0,0.16), 0 8px 22px rgba(0,0,0,0.09),
              0 0 0 1px rgba(44,62,80,0.28);
  border-color: rgba(44,62,80,0.32);
}

/* Active / depression — sinks into the page */
.portal:active {
  transform: translateY(4px) scale(0.974) !important;
  box-shadow: 0 1px 5px rgba(0,0,0,0.18),
              inset 0 5px 22px rgba(0,0,0,0.16),
              inset 0 1px 5px rgba(0,0,0,0.10) !important;
  border-color: var(--ff-paper-edge) !important;
  transition: transform 0.09s ease, box-shadow 0.09s ease !important;
}

/* Focus */
.portal:focus-visible { outline: 2px solid var(--ff-copper); outline-offset: 4px; }

/* ---- Portal icon ---- */
.portal__icon {
  display: grid; place-items: center;
  width: clamp(34px, 3.2vw, 44px); height: clamp(34px, 3.2vw, 44px);
  border-radius: 8px; flex-shrink: 0;
  margin-bottom: clamp(8px, 1vh, 13px);
  transition: background 0.28s ease;
}
.portal__icon svg { width: clamp(18px, 1.9vw, 24px); height: clamp(18px, 1.9vw, 24px); stroke-width: 2; }
.portal--ld  .portal__icon { background: var(--ff-copper-wash); color: var(--ff-copper-hot); }
.portal--iso .portal__icon { background: rgba(44,62,80,0.09); color: var(--ff-ink); }
.portal--ld:hover  .portal__icon { background: rgba(188,108,60,0.18); }
.portal--iso:hover .portal__icon { background: rgba(44,62,80,0.16); }

/* ---- Portal text ---- */
.portal__title {
  font-size: clamp(1rem, 1.8vw, 1.35rem);
  font-weight: 700; line-height: 1.1;
  margin-bottom: clamp(4px, 0.5vh, 7px); color: var(--ff-ink);
}
.portal__pitch {
  font-size: clamp(0.74rem, 1.1vw, 0.86rem);
  color: var(--ff-ink-muted); line-height: 1.55; max-width: 36ch;
  margin-bottom: clamp(8px, 1vh, 14px);
}
@media (max-width: 480px) { .portal__pitch { display: none; } }

/* ---- Chip rows ---- */
.portal__chips { display: flex; flex-direction: column; gap: 7px; flex: 1; }
.chip-row { display: flex; flex-wrap: wrap; gap: 5px; }

.chip {
  display: inline-block;
  font-family: var(--font-mono); font-size: clamp(0.6rem, 0.95vw, 0.7rem);
  font-weight: 400; border-radius: 4px;
  padding: 3px 9px; line-height: 1.5;
  white-space: nowrap; letter-spacing: 0.02em;
}
.chip--heavy {
  font-weight: 700; font-size: clamp(0.64rem, 1vw, 0.74rem);
  border-left: 3px solid;
}

/* LD chips — amber */
.portal--ld .chip {
  color: var(--ff-copper-hot); background: var(--ff-copper-wash);
  border: 1px solid rgba(188,108,60,0.20);
}
.portal--ld .chip--heavy {
  background: rgba(188,108,60,0.14);
  border-left-color: var(--ff-copper);
}

/* ISO chips — navy */
.portal--iso .chip {
  color: #2c3e50; background: rgba(44,62,80,0.07);
  border: 1px solid rgba(44,62,80,0.17);
}
.portal--iso .chip--heavy {
  background: rgba(44,62,80,0.13);
  border-left-color: #2c3e50;
}

@media (max-width: 480px) {
  .portal__chips .chip-row:nth-child(2) { display: none; }
}

/* ---- Hover info panel ---- */
.portal__info {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: var(--ff-ink);
  border-radius: 0 0 7px 7px;
  padding: clamp(14px, 1.8vw, 20px) clamp(16px, 2.2vw, 24px);
  transform: translateY(101%);
  transition: transform 0.32s cubic-bezier(0.22,0.61,0.36,1);
  border-top: 2px solid var(--ff-copper);
  z-index: 2; pointer-events: none;
  text-align: left;
}
.portal__info p {
  font-size: clamp(0.72rem, 1.05vw, 0.82rem);
  line-height: 1.6; margin: 0;
  color: #c8d4da;
}
.portal:hover .portal__info,
.portal:focus-visible .portal__info { transform: translateY(0); }
.portal:active .portal__info { transform: translateY(101%) !important; }

/* ---- Gateway entry rain ---- */
#gw-entry {
  position: fixed; inset: 0; z-index: 9998;
  background: #1a1a1a; cursor: pointer;
  display: none; transition: opacity 0.9s ease;
}
.ff-gateway-entry #gw-entry { display: block; }
#gw-entry canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }
#gw-entry.is-done { opacity: 0; pointer-events: none; }
@media (prefers-reduced-motion: reduce) { #gw-entry { display: none !important; } }

/* ---- Enter CTA ---- */
.portal__enter {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: clamp(12px, 1.8vh, 22px);
  font-family: var(--font-mono); font-weight: 700;
  font-size: clamp(0.7rem, 1.15vw, 0.82rem); letter-spacing: 0.05em;
  transition: gap 0.22s ease, color 0.22s ease;
}
.portal--ld  .portal__enter { color: var(--ff-copper-hot); }
.portal--iso .portal__enter { color: #3a5068; }
.portal--ld:hover  .portal__enter { gap: 14px; color: var(--ff-copper); }
.portal--iso:hover .portal__enter { gap: 14px; color: var(--ff-ink); }

/* ---- Footer hint ---- */
.gw-footer {
  flex-shrink: 0; text-align: center;
  font-family: var(--font-sans); font-size: clamp(0.82rem, 1.15vw, 0.95rem);
  color: var(--ff-ink-muted); line-height: 1.6;
  padding: clamp(6px, 0.8vh, 10px) 0;
  border-top: 1px solid var(--ff-paper-edge);
}
.gw-footer strong { color: var(--ff-ink); font-weight: 700; }
</style>
</head>
<body>
<script>
if (sessionStorage.getItem('ff-to-gateway') === '1') {
  document.documentElement.classList.add('ff-gateway-entry');
  sessionStorage.removeItem('ff-to-gateway');
}
</script>

<!-- Gateway cleansing entry rain -->
<div id="gw-entry" aria-hidden="true"><canvas id="gw-entry-canvas"></canvas></div>

<div class="gateway">

  <!-- ===== Header ===== -->
  <header class="gw-header">
    <div class="gw-brand">
      <img class="gw-brand__mark" src="assets/forge-mark.png" alt="" aria-hidden="true" />
      <div class="gw-brand__text">
        <span class="gw-brand__name">Forged Frameworks</span>

    </div>

  </header>

  <!-- ===== Divider ===== -->
  <div class="gw-divider" aria-hidden="true">
    <span class="gw-divider__rule"></span>
    <svg viewBox="0 0 100 132" width="20" height="26" aria-hidden="true">
      <path d="M30 14 L74 14 Q80 14 80 20 L80 40 Q80 46 74 46 L30 46 L12 30 Z" fill="#bc6c3c"/>
      <rect x="45" y="46" width="10" height="46" fill="#2c3e50"/>

</div>

<script src="transition.js"></script>
<script>
(function () {
  'use strict';

  /* ── 1. Ambient matrix rain ── */
  (function () {
    var c = document.getElementById('matrix');
    if (!c) return;
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    /* Skip on touch/mobile to avoid battery drain */
    if ('ontouchstart' in window && window.innerWidth < 768) { c.style.display = 'none'; return; }
    var ctx = c.getContext('2d');
    var chars = 'FORGEDFRAMEWORKS01アイ∆◊#&=><[]{}|~'.split('');
    var fs = 15, cols, drops;
    function resize() {
      c.width = window.innerWidth; c.height = window.innerHeight;
      cols = Math.floor(c.width / fs); drops = [];
      for (var i = 0; i < cols; i++) drops[i] = Math.random() * c.height / fs;
    }
    resize();
    window.addEventListener('resize', resize);
    setInterval(function () {
      ctx.fillStyle = 'rgba(252,251,249,0.09)';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.fillStyle = '#bc6c3c'; ctx.font = fs + 'px monospace';
      for (var i = 0; i < drops.length; i++) {
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fs, drops[i] * fs);
        if (drops[i] * fs > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.4;
      }
    }, 64);
  })();

  /* ── 4. Portal interactions ── */
  var ldTriggered = false, isoTriggered = false;

  var pLD = document.getElementById('portal-ld');
  if (pLD) {
    pLD.addEventListener('click', function () {
      if (ldTriggered) return; ldTriggered = true;
      FFTransition.fire('ld', 'learning-design.html');
    });
  }

  var pISO = document.getElementById('portal-iso');
  if (pISO) {
    pISO.addEventListener('click', function () {
      if (isoTriggered) return; isoTriggered = true;
      FFTransition.fire('iso', 'accreditation-quality.html');
    });
  }

  /* ── 5. Gateway entry rain ── */
  (function () {
    var el = document.getElementById('gw-entry');
    if (!el || !document.documentElement.classList.contains('ff-gateway-entry')) return;
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) { el.parentNode && el.parentNode.removeChild(el); return; }
    var cvs = document.getElementById('gw-entry-canvas');
    var ctx = cvs && cvs.getContext('2d');
    if (!ctx) return;
    var chars = 'FORGEDFRAMEWORKS01アイ∆◊#&=><[]{}|~'.split('');
    var fs = 16, w = cvs.width = window.innerWidth, h = cvs.height = window.innerHeight;
    var cols = Math.floor(w / fs), drops = [];
    for (var i = 0; i < cols; i++) drops[i] = Math.random() * -30;
    var done = false, raf;
    function draw() {
      if (done) return;
      ctx.fillStyle = 'rgba(26,26,26,0.08)'; ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#bc6c3c'; ctx.font = fs + "px 'JetBrains Mono', monospace";
      for (var i = 0; i < drops.length; i++) {
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fs, drops[i] * fs);
        if (drops[i] * fs > h && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.65;
      }
      raf = requestAnimationFrame(draw);
    }
    raf = requestAnimationFrame(draw);
    function dismiss() {
      done = true; if (raf) cancelAnimationFrame(raf);
      el.classList.add('is-done');
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 950);
    }
    setTimeout(dismiss, 2400);
    el.addEventListener('click', dismiss);
  }());

})();
</script>
