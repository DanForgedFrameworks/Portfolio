<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAB6101 Learning Resources S03</title>
<style>
/* # ==============================================================================
# PROJECT: Forged Frameworks - VLE Automated Curriculum Pipeline
# AUTHOR: Daniel Boyland
# ORGANISATION: Forged Frameworks
# DESCRIPTION: TAB6101 S03 single-resource Learning Resources block.
# VERSION: v1.0.0 (Biofilms briefing resource)
# ==============================================================================
# SCRIPT ROLE: THE LIBRARY EXPLORER (Interactive Resource Asset)
# FUNCTION: Renders a single resource card that expands into an in-flow detailed
#           view with action guidance, link fallback and reflective prompts.
# ==============================================================================
*/

* { box-sizing: border-box; }
:root {
  --deep-purple: #370c65;
  --light-purple: #691eda;
  --pastel-purple-bg: #f2effc;
  --pastel-purple-border: #ece6f9;
  --coral-accent: #f08838;
  --academic-green: #059669;
  --white: #ffffff;
  --text-main: #2d3436;
  --text-muted: #57606f;
  --radius-lg: 24px;
  --radius-sm: 12px;
  --directional-shadow: 12px 12px 25px rgba(55, 12, 101, 0.12);
  --heavy-shadow: 18px 18px 35px rgba(55, 12, 101, 0.2);
}

body {
  margin: 0;
  padding: 0;
  color: var(--text-main);
  background-color: transparent;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

#library-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  overflow: hidden;
  background-color: #f8fafc;
  padding: 30px 20px;
}

.digital-bg {
  position: absolute;
  top: -50%;
  left: -50%;
  z-index: -1;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(var(--light-purple) 2px, transparent 2px);
  background-size: 45px 45px;
  opacity: 0.08;
  animation: pan-digital-grid 50s linear infinite;
}

@keyframes pan-digital-grid {
  0% { transform: translate(0, 0); }
  100% { transform: translate(45px, 45px); }
}

#front-view { transition: opacity 0.3s ease; }
.main-header { text-align: center; margin-bottom: 22px; }
h1 { color: var(--deep-purple); margin: 0 0 5px 0; font-size: 2rem; line-height: 1.15; }
.subtitle { color: var(--text-muted); font-size: 1rem; margin: 0; }
.navigation-hint {
  max-width: 760px;
  margin: 0 auto 22px;
  color: var(--text-muted);
  font-size: 0.85rem;
  text-align: center;
}
.hide-cite { display: none; }

.card-grid {
  display: grid;
  grid-template-columns: minmax(240px, 520px);
  justify-content: center;
  gap: 25px;
  max-width: 900px;
  margin: 0 auto;
}

.trigger-card {
  width: 100%;
  min-height: 210px;
  appearance: none;
  background: var(--white);
  border: 2px solid var(--pastel-purple-border);
  border-radius: var(--radius-lg);
  padding: 30px 24px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s;
  box-shadow: var(--directional-shadow);
}

.trigger-card:hover {
  transform: translate(-5px, -5px);
  box-shadow: var(--heavy-shadow);
  border-color: var(--light-purple);
}

.trigger-card:focus-visible,
.back-btn:focus-visible,
.btn-primary:focus-visible,
.btn-outline:focus-visible {
  outline: 4px solid #ffbf47;
  outline-offset: 3px;
}

.trigger-icon {
  display: inline-flex;
  align-items: center;
  margin-bottom: 15px;
  padding: 15px;
  background: var(--pastel-purple-bg);
  border-radius: 50%;
}

.trigger-title {
  display: block;
  color: var(--deep-purple);
  font-weight: 800;
  font-size: 1.2rem;
  margin: 0;
}

.trigger-meta {
  display: block;
  margin-top: 8px;
  color: var(--text-muted);
  font-size: 0.9rem;
  line-height: 1.45;
}

#expanded-view {
  display: none;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.back-btn {
  margin-bottom: 25px;
  padding: 8px 20px;
  background: var(--pastel-purple-bg);
  border: none;
  border-radius: 30px;
  color: var(--deep-purple);
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

.back-btn:hover {
  background: var(--deep-purple);
  color: var(--white);
}

.content-row {
  display: flex;
  align-items: stretch;
  gap: 20px;
  margin-bottom: 20px;
}

.context-panel {
  flex: 2;
  background: var(--white);
  border-radius: var(--radius-sm);
  box-shadow: var(--directional-shadow);
  border-left: 6px solid var(--deep-purple);
  padding: 20px;
}

.resource-pill {
  display: inline-block;
  margin-bottom: 10px;
  padding: 4px 10px;
  background: var(--pastel-purple-bg);
  border-radius: 999px;
  color: var(--deep-purple);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.alignment-note {
  margin-top: 12px;
  padding: 10px 12px;
  background: #fff7ed;
  border-left: 4px solid var(--coral-accent);
  border-radius: 8px;
  color: #5f3514;
  font-size: 0.9rem;
}

.action-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  opacity: 0;
  background: var(--pastel-purple-bg);
  border: 2px solid var(--light-purple);
  border-radius: var(--radius-sm);
  padding: 20px;
}

.pedagogy-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.bubble {
  opacity: 0;
  background: var(--white);
  border: 2px solid var(--pastel-purple-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--directional-shadow);
  font-size: 0.9rem;
}

.bubble-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 0 8px 0;
  font-weight: 800;
  font-size: 1rem;
}

.bubble-activity .bubble-header { color: var(--academic-green); }
.bubble-reflection .bubble-header { color: var(--light-purple); }

.discussion-panel {
  opacity: 0;
  background: var(--white);
  border: 2px solid var(--pastel-purple-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--directional-shadow);
}

.discussion-text {
  color: var(--deep-purple);
  text-align: center;
  font-style: italic;
  font-weight: 600;
  font-size: 1rem;
}

.btn-primary {
  display: inline-block;
  width: 100%;
  max-width: 200px;
  margin-bottom: 10px;
  padding: 10px 20px;
  background: var(--deep-purple);
  color: var(--white);
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  transition: background 0.2s ease;
}

.url-mini-box {
  width: 100%;
  margin-bottom: 12px;
  padding: 8px;
  background: var(--white);
  border: 1px solid var(--pastel-purple-border);
  border-radius: 4px;
  color: var(--text-main);
  font-family: monospace;
  font-size: 0.8rem;
  text-align: left;
  word-break: break-all;
}

.btn-outline {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 20px;
  background: transparent;
  color: var(--deep-purple);
  border: 2px solid var(--deep-purple);
  border-radius: var(--radius-sm);
  text-decoration: none;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

.btn-outline:hover {
  background: var(--deep-purple);
  color: var(--white);
}

.action-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  width: 100%;
}

.link-hint {
  margin-top: 8px;
  color: var(--text-muted);
  font-size: 0.75rem;
  font-style: italic;
}

.animate-in {
  animation: floatIn 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
}

@keyframes floatIn {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

@media (max-width: 1000px) {
  .content-row,
  .pedagogy-row {
    flex-direction: column;
    grid-template-columns: 1fr;
  }
}

@media (max-width: 640px) {
  #library-wrapper { padding: 22px 14px; }
  .main-header { margin-bottom: 14px; }
  h1 { font-size: 1.7rem; }
  .subtitle { margin-top: 8px; font-size: 0.95rem; }
  .navigation-hint { margin-bottom: 16px; font-size: 0.8rem; line-height: 1.45; }
  .card-grid { grid-template-columns: 1fr; gap: 14px; }
  .trigger-card { min-height: 168px; padding: 22px 16px; }
  .trigger-icon { margin-bottom: 10px; padding: 12px; }
  .back-btn { width: 100%; min-height: 44px; margin-bottom: 16px; }
  .content-row, .pedagogy-row { gap: 14px; margin-bottom: 14px; }
  .context-panel, .action-panel, .bubble, .discussion-panel { padding: 16px; }
  .context-panel h2 { font-size: 1.25rem !important; }
  .action-buttons { display: grid; grid-template-columns: 1fr; }
  .btn-primary, .btn-outline { width: 100%; max-width: none; min-height: 44px; margin: 0; }
  .url-mini-box { font-size: 0.74rem; }
  .bubble, .discussion-text { font-size: 0.9rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  .digital-bg { animation: none; }
}
</style>
</head>
<body>
<div id="library-wrapper">
  <div class="digital-bg" aria-hidden="true"></div>

  <div id="front-view">
    <div class="main-header">
      <h1>Further learning resources<span class="hide-cite"></span></h1>
      <p class="subtitle">Select the resource to explore biofilms and resistance traits.<span class="hide-cite"></span></p>
    </div>

    <p class="navigation-hint"><strong>Navigation:</strong> select the card to view the resource details. On a keyboard, use <strong>Tab</strong> to move to the card and <strong>Enter</strong> or <strong>Space</strong> to select.</p>

    <div class="card-grid">
      <button class="trigger-card" type="button" onclick="openResource('resource1', this)">
        <span class="trigger-icon" aria-hidden="true">
          <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="var(--deep-purple)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
          </svg>
        </span>
        <span class="trigger-title">Industry report<span class="hide-cite"></span></span>
        <span class="trigger-meta">Biofilms: microbial life on surfaces<span class="hide-cite"></span></span>
      </button>
    </div>
  </div>

  <div id="expanded-view">
    <button class="back-btn" type="button" onclick="closeResource()">Back</button>
    <div id="dynamic-content"></div>
  </div>
</div>

<script>
let timers = [];
let lastTrigger = null;

const resourceData = {
  resource1: {
    type: "Industry report",
    title: "Biofilms: Microbial Life on Surfaces",
    source: "Microbiology Society",
    cost: "Free, registration OK",
    confidence: "High",
    confidenceNote: "The Microbiology Society maintains a stable and authoritative archive of briefing papers; the search term is highly specific.",
    alignment: "Virulence factors and resistance traits",
    context: "This briefing paper from the Microbiology Society is a primary UK resource that translates complex structural biology into industrial and clinical contexts. It directly supports the cross-cutting themes of contamination investigation and real-world laboratory accountability.",
    activity: "Read the sections on 'Biofilm formation' and 'AMR'. Identify three structural components of the Extracellular Polymeric Substance (EPS) matrix and describe how they physically impede the penetration of common laboratory disinfectants.",
    reflection: [
      "Perform a 'Gap Analysis' on your current laboratory's Clean-In-Place (CIP) or environmental monitoring protocols.",
      "Based on this report, where are the structural vulnerabilities in your system that might allow biofilms to persist?"
    ],
    discussion: "Discuss with your mentor how the lab identifies biofilm-forming isolates, for example mucoid phenotypes. Ask how these structural traits change the risk communication sent to clinical or manufacturing stakeholders.",
    url: "https://microbiologysociety.org/resource/new-briefing-towards-biofilm-innovation-how-can-we-tackle-challenges-and-unlock-their-potential.html"
  }
};

function copyToClipboard(url) {
  const el = document.createElement('textarea');
  el.value = url;
  el.setAttribute('readonly', '');
  el.style.position = 'absolute';
  el.style.left = '-9999px';
  document.body.appendChild(el);
  const selected = document.getSelection().rangeCount > 0 ? document.getSelection().getRangeAt(0) : false;
  el.select();
  let copied = false;
  try {
    copied = document.execCommand('copy');
  } catch (error) {
    copied = false;
  }
  document.body.removeChild(el);
  if (selected) {
    document.getSelection().removeAllRanges();
    document.getSelection().addRange(selected);
  }
  const btn = document.getElementById('copy-btn');
  const hint = document.getElementById('copy-status');
  btn.innerHTML = copied ? 'Copied!' : 'Copy unavailable';
  btn.style.backgroundColor = copied ? 'var(--academic-green)' : 'var(--coral-accent)';
  hint.textContent = copied
    ? 'Link copied. Paste it into a fresh browser tab.'
    : 'Copying is unavailable. Select and copy the visible URL manually.';
  setTimeout(() => {
    btn.innerHTML = 'Copy Link';
    btn.style.backgroundColor = 'var(--deep-purple)';
  }, 2000);
}

function openResource(type, trigger) {
  const data = resourceData[type];
  const container = document.getElementById('dynamic-content');
  const frontView = document.getElementById('front-view');
  const expandedView = document.getElementById('expanded-view');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const revealDelays = reduceMotion ? [0, 0, 0, 0] : [300, 900, 1100, 1300];

  lastTrigger = trigger;
  timers.forEach(clearTimeout);
  timers = [];

  container.innerHTML = `
    <div class="content-row">
      <div class="context-panel">
        <span class="resource-pill">${data.type}</span>
        <h2 style="color: var(--deep-purple); margin: 0 0 10px 0; font-size: 1.4rem;">${data.title}<span class="hide-cite"></span></h2>
        <p><strong>Source:</strong> ${data.source}<span class="hide-cite"></span></p>
        <p><strong>Cost:</strong> ${data.cost}<span class="hide-cite"></span></p>
        <p>${data.context}<span class="hide-cite"></span></p>
        <div class="alignment-note"><strong>Alignment:</strong> ${data.alignment}<span class="hide-cite"></span></div>
      </div>
      <div class="action-panel" id="lbox">
        <h3 style="color: var(--deep-purple); margin: 0 0 8px 0; font-size: 1rem;">Resource Link<span class="hide-cite"></span></h3>
        <div class="url-mini-box">${data.url}</div>
        <div class="action-buttons">
          <button id="copy-btn" type="button" onclick="copyToClipboard('${data.url}')" class="btn-primary" style="flex-grow: 1;">Copy Link</button>
          <a href="${data.url}" target="_blank" rel="noopener noreferrer" class="btn-outline" style="flex-grow: 1; padding: 12px 24px;">Open Tab</a>
        </div>
        <p id="copy-status" class="link-hint" aria-live="polite">Select Open Tab, or copy the link and paste it into a fresh browser tab.<span class="hide-cite"></span></p>
      </div>
    </div>
    <div class="pedagogy-row">
      <div class="bubble bubble-activity" id="b1">
        <h3 class="bubble-header">Suggested Activity<span class="hide-cite"></span></h3>
        <p>${data.activity}<span class="hide-cite"></span></p>
      </div>
      <div class="bubble bubble-reflection" id="b2">
        <h3 class="bubble-header">Reflective Journal Prompt<span class="hide-cite"></span></h3>
        <ul style="padding-left: 20px; margin: 0;">${data.reflection.map(r => `<li>${r}<span class="hide-cite"></span></li>`).join('')}</ul>
      </div>
    </div>
    <div class="discussion-panel" id="b3">
      <h3 class="bubble-header" style="justify-content: center; color: var(--coral-accent);">Discussion Prompt<span class="hide-cite"></span></h3>
      <div class="discussion-text">"${data.discussion}"<span class="hide-cite"></span></div>
    </div>
  `;

  frontView.style.display = 'none';
  expandedView.style.display = 'block';
  window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
  expandedView.querySelector('.back-btn').focus();

  timers.push(setTimeout(() => document.getElementById('lbox').classList.add('animate-in'), revealDelays[0]));
  timers.push(setTimeout(() => document.getElementById('b1').classList.add('animate-in'), revealDelays[1]));
  timers.push(setTimeout(() => document.getElementById('b2').classList.add('animate-in'), revealDelays[2]));
  timers.push(setTimeout(() => document.getElementById('b3').classList.add('animate-in'), revealDelays[3]));
}

function closeResource() {
  document.getElementById('expanded-view').style.display = 'none';
  document.getElementById('front-view').style.display = 'block';
  timers.forEach(clearTimeout);
  if (lastTrigger) lastTrigger.focus();
}

document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && document.getElementById('expanded-view').style.display === 'block') {
    closeResource();
  }
});
</script>
</body>
</html>
