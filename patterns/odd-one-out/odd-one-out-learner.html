<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formatting Knowledge Checks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: linear-gradient(180deg, #f4f0ff, #e6dff9); min-height: 100vh; margin: 0; padding: 40px 20px; display: flex; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;}
    .learner-wrapper { width: 100%; max-width: 1300px; position: relative; margin: 0 auto; }
    
    .ouo-app { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #2d3748; width: 100%; }
    .ouo-app * { box-sizing: border-box; } 
    .ouo-screen { opacity: 1; transform: translateY(0); transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease; display: block; text-align: center; }
    .ouo-screen.roll-out-up { transform: translateY(-50px); opacity: 0; pointer-events: none; position: absolute; width: 100%; }
    .ouo-screen.roll-in-up { animation: rollIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .ouo-hidden { display: none !important; }
    @keyframes rollIn { 0% { transform: translateY(100px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

    .ouo-intro { text-align: center; margin-bottom: 40px; }
    .ouo-eyebrow { color: #6221f1; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.85rem; margin-bottom: 12px; }
    .ouo-title { font-size: 2.6rem; font-weight: 800; margin-bottom: 16px; color: #1a202c; line-height: 1.2; }
    .ouo-text { font-size: 1.15rem; color: #4a5568; max-width: 800px; margin: 0 auto; line-height: 1.6; }

    .ouo-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; margin-bottom: 40px; width: 100%; }
    
    .ouo-card {
      box-sizing: border-box; 
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 2px solid transparent; border-radius: 20px; padding: 25px; 
      display: flex; flex-direction: column; cursor: pointer; position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 8px 24px rgba(0,0,0,0.06); text-align: left;
    }

    .ouo-grid[data-total="4"] .ouo-card {
      flex: 0 1 calc(25% - 18px); min-width: 220px; max-width: 300px; min-height: 250px;
    }

    .ouo-grid[data-total="5"] .ouo-card,
    .ouo-grid[data-total="6"] .ouo-card,
    .ouo-grid[data-total="7"] .ouo-card,
    .ouo-grid[data-total="8"] .ouo-card {
      flex: 0 1 calc(33.333% - 16px); min-width: 280px; max-width: 360px; min-height: 250px;
    }

    .ouo-grid:not([data-total="4"]):not([data-total="5"]):not([data-total="6"]):not([data-total="7"]):not([data-total="8"]) .ouo-card {
      flex: 0 1 calc(33.333% - 16px); min-width: 280px; max-width: 360px; min-height: 250px;
    }

    .ouo-card:hover { transform: translateY(-8px); box-shadow: 0 16px 32px rgba(98, 33, 241, 0.15); border-color: rgba(98, 33, 241, 0.2); }
    
    .ouo-bg-clip { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; border-radius: 20px; z-index: 0; pointer-events: none; }
    .ouo-bg-mark { position: absolute; top: -10px; right: 10px; font-size: 7rem; font-weight: 900; color: rgba(98, 33, 241, 0.04); z-index: 0; line-height: 1; user-select: none;}
    
    .ouo-card.selected { border-color: #6221f1; box-shadow: 0 0 0 3px rgba(98,33,241,0.2), 0 16px 32px rgba(98,33,241,0.15); background: #ffffff; }
    .ouo-badge {
      position: absolute; top: -14px; right: 20px; background: #6221f1; color: white; font-weight: 700;
      font-size: 0.85rem; padding: 6px 16px; border-radius: 20px; text-transform: uppercase; opacity: 0;
      transform: translateY(10px); transition: all 0.3s ease; pointer-events: none; z-index: 5; box-shadow: 0 4px 10px rgba(98,33,241,0.3);
    }
    .ouo-card.selected .ouo-badge { opacity: 1; transform: translateY(0); }

    .ouo-card.is-correct { z-index: 10; background: #f0fff4; border-color: #38a169; box-shadow: 0 0 0 3px rgba(56,161,105,0.3), 0 20px 40px rgba(56,161,105,0.2); animation: popUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .ouo-card.is-correct .ouo-badge { background: #38a169; opacity: 1; transform: translateY(0); }
    .ouo-card.is-incorrect { z-index: 10; background: #fff5f5; border-color: #e53e3e; box-shadow: 0 0 0 3px rgba(229,62,62,0.3), 0 16px 32px rgba(229,62,62,0.15); animation: popAndShake 0.6s ease-in-out forwards; }
    .ouo-card.is-incorrect .ouo-badge { background: #e53e3e; opacity: 1; transform: translateY(0); }

    @keyframes popUp { 0% { transform: scale(1); } 100% { transform: scale(1.05) translateY(-5px); } }
    @keyframes popAndShake { 0% { transform: scale(1) translateX(0); } 20% { transform: scale(1.05) translateX(-8px); } 40% { transform: scale(1.05) translateX(8px); } 60% { transform: scale(1.05) translateX(-6px); } 80% { transform: scale(1.05) translateX(6px); } 100% { transform: scale(1.05) translateX(0); } }

    .ouo-content-wrapper { flex-grow: 1; display: flex; flex-direction: column; position: relative; z-index: 1; justify-content: center; }
    
    .ouo-card-title { color: #6221f1; font-weight: 700; font-size: 1.2rem; margin-bottom: 15px; line-height: 1.3; text-align: center; }
    .ouo-card-body { color: #4a5568; font-size: 1rem; line-height: 1.5; margin: 0; text-align: center; }

    .ouo-action { display: flex; justify-content: center; margin-top: 20px; flex-direction: column; align-items: center; gap: 10px; }
    .ouo-btn { background: #6221f1; color: #ffffff; border: none; border-radius: 30px; padding: 16px 40px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 14px rgba(98,33,241,0.3); }
    .ouo-btn:hover:not(:disabled) { background: #501ad9; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(98,33,241,0.4); }
    .ouo-btn:disabled { background: #cbd5e0; box-shadow: none; cursor: not-allowed; transform: none; }

    .ouo-feedback-panel { background: #ffffff; border-radius: 20px; padding: 50px; margin: 20px auto 40px auto; box-shadow: 0 8px 24px rgba(0,0,0,0.06); max-width: 900px; text-align: center; }
    .ouo-result-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; }
    .ouo-correct-col { color: #38a169; } .ouo-incorrect-col { color: #e53e3e; }
    .ouo-feedback-text p { font-size: 1.15rem; line-height: 1.7; margin-bottom: 20px; color: #4a5568; text-align: left; }
    .ouo-feedback-text strong { color: #0f172a; }

    /* Styling for Dynamic Feedback Elements */
    .misconception-block { background: #f3f0ff; border-left: 4px solid #6221f1; padding: 20px; margin-top: 20px; border-radius: 0 8px 8px 0; text-align: left; }
    .misconception-title { font-weight: 800; color: #501ad9; margin-bottom: 10px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .correction-block { background: #fff5f5; border-left: 4px solid #e53e3e; padding: 20px; margin-top: 20px; border-radius: 0 8px 8px 0; text-align: left; }
    .correction-title { font-weight: 800; color: #c53030; margin-bottom: 10px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .correction-card-title { font-weight: 700; color: #1a202c; font-size: 1.1rem; margin-bottom: 6px;}

    .ouo-loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1500; flex-direction: column; justify-content: center; align-items: center; }
    .ouo-shuffle { position: relative; width: 160px; height: 100px; margin-bottom: 30px; }
    .ouo-scard { position: absolute; width: 45px; height: 70px; background: white; border: 3px solid #6221f1; border-radius: 6px; top: 15px; box-shadow: 0 4px 10px rgba(98,33,241,0.2); }
    .ouo-scard::after { content: '?'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #6221f1; font-weight: bold; font-size: 1.5rem; opacity: 0.3; }
    .ouo-c1 { animation: sLeft 1.2s infinite cubic-bezier(0.4,0,0.2,1); } .ouo-c2 { left: 57px; animation: sCenter 1.2s infinite cubic-bezier(0.4,0,0.2,1); } .ouo-c3 { animation: sRight 1.2s infinite cubic-bezier(0.4,0,0.2,1); }
    @keyframes sLeft { 0% { left: 0; z-index: 1; transform: scale(1); } 50% { left: 115px; z-index: 10; transform: scale(1.1) rotate(5deg); } 100% { left: 0; z-index: 1; transform: scale(1); } }
    @keyframes sRight { 0% { left: 115px; z-index: 2; transform: scale(1); } 50% { left: 0; z-index: 0; transform: scale(0.9) rotate(-5deg); } 100% { left: 115px; z-index: 2; transform: scale(1); } }
    @keyframes sCenter { 0% { transform: translateY(0); } 25% { transform: translateY(-15px); } 50% { transform: translateY(0); } 75% { transform: translateY(15px); } 100% { transform: translateY(0); } }
    .ouo-ltext { color: #6221f1; font-size: 1.5rem; font-weight: 700; }

    .ouo-confetti { position: fixed; top: -15px; width: 10px; height: 10px; z-index: 2000; animation: cFall linear forwards; }
    @keyframes cFall { to { transform: translateY(105vh) rotate(720deg); } }
  </style>
</head>
<body>
  <div class="learner-wrapper" id="standalone-root"></div>
  
  <script>
    const payloadData = [
      {

          {

    class StandaloneOUOApp {
      constructor(containerId, stateData) {
        this.container = document.getElementById(containerId);
        this.data = stateData;
        this.currentIndex = 0;
        this.selectedCardIndex = null;
        this.score = 0;
        this.buildDOM();
        this.renderChallenge(0);
      }
      toRoman(num) {
        const roman = {M:1000, CM:900, D:500, CD:400, C:100, XC:90, L:50, XL:40, X:10, IX:9, V:5, IV:4, I:1};
        let str = '';
        for (let i of Object.keys(roman)) {
          let q = Math.floor(num / roman[i]);
          num -= q * roman[i];
          str += i.repeat(q);
        }
        return str;
      }
      buildDOM() {
        this.container.innerHTML = `
          <div class="ouo-app">
            <div class="ouo-screen" id="quizScreen_${this.container.id}">
              <div class="ouo-intro">
                <p class="ouo-eyebrow" id="eyebrow_${this.container.id}"></p>
                <h1 class="ouo-title" id="title_${this.container.id}"></h1>
                <p class="ouo-text" id="inst_${this.container.id}"></p>
              </div>
              <div class="ouo-grid" id="grid_${this.container.id}"></div>
              <div class="ouo-action">
                <button class="ouo-btn" id="submit_${this.container.id}" disabled>Lock in Selection</button>
              </div>
            </div>

            <div class="ouo-screen ouo-hidden" id="fbScreen_${this.container.id}">
              <div class="ouo-intro">
                <p class="ouo-eyebrow">Detailed Feedback</p>
                <h1 class="ouo-title" id="fbTitle_${this.container.id}">Check results</h1>
              </div>
              <div class="ouo-feedback-panel">
                <div class="ouo-result-title" id="fbStatus_${this.container.id}"></div>
                <div class="ouo-feedback-text" id="fbBody_${this.container.id}"></div>
              </div>
              <div class="ouo-action">
                <button class="ouo-btn" id="next_${this.container.id}"></button>
              </div>
            </div>

            <div class="ouo-screen ouo-hidden" id="endScreen_${this.container.id}">
              <div class="ouo-intro">
                <h1 class="ouo-title">Knowledge Check Complete!</h1>
                <p class="ouo-text" id="score_${this.container.id}" style="font-size:1.3rem; font-weight:600; color:#6221f1;"></p>
              </div>
              <div class="ouo-action">
                <button class="ouo-btn" id="reload_${this.container.id}">Reload Challenge</button>
              </div>
            </div>

            <div class="ouo-loader" id="loader_${this.container.id}">
              <div class="ouo-shuffle">
                <div class="ouo-scard ouo-c1"></div><div class="ouo-scard ouo-c2"></div><div class="ouo-scard ouo-c3"></div>
              </div>
              <div class="ouo-ltext">Evaluating selection...</div>
            </div>
          </div>
        `;

        this.container.querySelector(`#submit_${this.container.id}`).onclick = () => this.submit();
        this.container.querySelector(`#next_${this.container.id}`).onclick = () => this.next();
        this.container.querySelector(`#reload_${this.container.id}`).onclick = () => this.restart();
      }

      renderChallenge(index) {
        if(!this.data || this.data.length === 0) return;
        const quiz = this.data[index];
        this.container.querySelector(`#eyebrow_${this.container.id}`).innerText = `Challenge ${index + 1} of ${this.data.length}`;
        this.container.querySelector(`#title_${this.container.id}`).innerText = quiz.title;
        this.container.querySelector(`#inst_${this.container.id}`).innerHTML = quiz.instruction;

        const grid = this.container.querySelector(`#grid_${this.container.id}`);
        grid.innerHTML = '';
        
        grid.setAttribute('data-total', quiz.cards.length);

        this.selectedCardIndex = null;
        this.container.querySelector(`#submit_${this.container.id}`).disabled = true;

        quiz.cards.forEach((card, idx) => {
          const el = document.createElement('div');
          el.className = 'ouo-card';
          
          let mark = '';
          if(quiz.watermark === 'letter') mark = String.fromCharCode(65 + idx);
          if(quiz.watermark === 'number') mark = String(idx + 1).padStart(2, '0');
          if(quiz.watermark === 'roman') mark = this.toRoman(idx + 1);

          el.innerHTML = `
            <div class="ouo-bg-clip"><div class="ouo-bg-mark">${mark}</div></div>
            <div class="ouo-badge">Selected</div>
            <div class="ouo-content-wrapper no-img">
              <div class="ouo-card-title">${card.title}</div>
              <div class="ouo-card-body">${card.front}</div>
            </div>
          `;

          el.onclick = () => this.selectCard(idx, el);
          grid.appendChild(el);
        });

        window[`appInstance_${this.container.id}`] = this;
      }

      selectCard(idx, el) {
        if(el.classList.contains('is-correct') || el.classList.contains('is-incorrect')) return;
        const all = this.container.querySelectorAll('.ouo-card');
        const subBtn = this.container.querySelector(`#submit_${this.container.id}`);
        
        if(this.selectedCardIndex === idx) {
          this.selectedCardIndex = null;
          el.classList.remove('selected');
          subBtn.disabled = true;
        } else {
          all.forEach(c => c.classList.remove('selected'));
          this.selectedCardIndex = idx;
          el.classList.add('selected');
          subBtn.disabled = false;
        }
      }

      fireConfetti() {
        const colors = ['#6221f1', '#38a169', '#3498db', '#f6ad55', '#e53e3e'];
        for (let i = 0; i < 50; i++) {
          const c = document.createElement('div');
          c.className = 'ouo-confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDuration = (Math.random() * 2 + 2) + 's';
          c.style.animationDelay = (Math.random() * 0.5) + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4000);
        }
      }

      submit() {
        if(this.selectedCardIndex === null) return;
        const subBtn = this.container.querySelector(`#submit_${this.container.id}`);
        const loader = this.container.querySelector(`#loader_${this.container.id}`);
        subBtn.disabled = true;
        loader.style.display = 'flex';

        setTimeout(() => {
          loader.style.display = 'none';
          
          const quiz = this.data[this.currentIndex];
          const cardsNode = this.container.querySelectorAll('.ouo-card');
          const selectedEl = cardsNode[this.selectedCardIndex];
          
          const correctIndex = quiz.cards.findIndex(c => c.isDistractor);
          const isCorrect = (this.selectedCardIndex === correctIndex);

          if(isCorrect) {
            selectedEl.classList.add('is-correct');
            this.score++;
            this.fireConfetti();
          } else {
            selectedEl.classList.add('is-incorrect');
          }

          setTimeout(() => {
            this.showFeedback(isCorrect, quiz);
            this.transitionScreen(`quizScreen_${this.container.id}`, `fbScreen_${this.container.id}`);
          }, 1600);

        }, 1500);
      }

      showFeedback(isCorrect, quiz) {
        const fbTitle = this.container.querySelector(`#fbTitle_${this.container.id}`);
        const fbStatus = this.container.querySelector(`#fbStatus_${this.container.id}`);
        const fbBody = this.container.querySelector(`#fbBody_${this.container.id}`);
        const nxtBtn = this.container.querySelector(`#next_${this.container.id}`);

        fbTitle.innerText = `${quiz.title} Results`;
        
        let feedbackHTML = "";

        if(isCorrect) {
          fbStatus.innerText = "Correct! You identified the formatting error.";
          fbStatus.className = "ouo-result-title ouo-correct-col";
          
          feedbackHTML = quiz.feedbackCorrect || "";
          if(quiz.feedbackMisconception && quiz.feedbackMisconception.trim() !== "") {
             feedbackHTML += `
              <div class="misconception-block">
                <div class="misconception-title">Misconception Analysis</div>
                <div style="font-size: 0.95rem; color: #4a5568;">${quiz.feedbackMisconception}</div>
              </div>
             `;
          }

        } else {
          fbStatus.innerText = "Incorrect. Let's review the formatting rules.";
          fbStatus.className = "ouo-result-title ouo-incorrect-col";
          
          const correctCard = quiz.cards.find(c => c.isDistractor);
          feedbackHTML = (quiz.feedbackIncorrect || "") + `
            <div class="correction-block">
              <div class="correction-title">The Formatting Error</div>
              <div class="correction-card-title">${correctCard.title}</div>
              <div style="font-size: 0.95rem; color: #4a5568;">${correctCard.front}</div>
            </div>
          `;
        }

        fbBody.innerHTML = feedbackHTML;

        if (this.currentIndex === this.data.length - 1) {
          nxtBtn.innerText = "Finish Challenge";
        } else {
          nxtBtn.innerText = "Next Challenge";
        }
      }

      next() {
        if (this.currentIndex < this.data.length - 1) {
          this.currentIndex++;
          this.renderChallenge(this.currentIndex);
          this.transitionScreen(`fbScreen_${this.container.id}`, `quizScreen_${this.container.id}`);
        } else {
          this.container.querySelector(`#score_${this.container.id}`).innerText = `You correctly identified ${this.score} out of ${this.data.length} formatting errors.`;
          this.transitionScreen(`fbScreen_${this.container.id}`, `endScreen_${this.container.id}`);
        }
      }

      restart() {
        this.currentIndex = 0;
        this.score = 0;
        this.renderChallenge(0);
        this.transitionScreen(`endScreen_${this.container.id}`, `quizScreen_${this.container.id}`);
      }

      transitionScreen(outId, inId) {
        const outEl = this.container.querySelector(`#${outId}`);
        const inEl = this.container.querySelector(`#${inId}`);
        outEl.classList.add('roll-out-up');
        setTimeout(() => {
          outEl.classList.add('ouo-hidden');
          outEl.classList.remove('roll-out-up');
          inEl.classList.remove('ouo-hidden');
          inEl.classList.add('roll-in-up');
          setTimeout(() => inEl.classList.remove('roll-in-up'), 600);
        }, 500);
      }
    }

    new StandaloneOUOApp('standalone-root', payloadData);
  </script>
</body>
</html>
